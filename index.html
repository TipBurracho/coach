<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b0f14" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'" />
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="icon" href="./icon.svg" />
<link rel="apple-touch-icon" href="./icon.svg" />
<meta name="mobile-web-app-capable" content="yes" />
<title>Coach — Training OS</title>
<style>
  :root{
    --bg:#0b0f14; --panel:#121924; --panel-2:#0f1620; --line:#1e2a3a;
    --ink:#e8eef6; --muted:#8ea0b5; --dim:#5f7189;
    --accent:#4cc2ff; --accent-2:#7c5cff; --good:#39d98a; --warn:#ffb020; --bad:#ff5d5d;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  body{padding-bottom:86px}
  body.setup{padding-bottom:20px}
  body.setup nav.tabs{display:none}
  .wrap{max-width:720px;margin:0 auto;padding:14px 14px 20px}
  header.app{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 14px 6px;max-width:720px;margin:0 auto}
  header.app h1{font-size:15px;margin:0;font-weight:650}
  .brandmark{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:grid;place-items:center;color:#03121c;font-weight:800;font-size:13px}
  .sub{color:var(--dim);font-size:11px;font-family:var(--mono)}
  .row{display:flex;gap:10px} .col{display:flex;flex-direction:column;gap:10px}
  .grid{display:grid;gap:10px} .g2{grid-template-columns:1fr 1fr} .g3{grid-template-columns:1fr 1fr 1fr}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px}
  .card h3{margin:0 0 10px;font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-weight:650}
  .muted{color:var(--muted)} .dim{color:var(--dim)} .mono{font-family:var(--mono)}
  .pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600;border:1px solid var(--line);background:var(--panel-2)}
  .pill.good{color:var(--good);border-color:#1c3b2c;background:#0e1c15}
  .pill.warn{color:var(--warn);border-color:#3b2f14;background:#1c160a}
  .pill.bad{color:var(--bad);border-color:#3b1c1c;background:#1c0d0d}
  button{font-family:inherit;cursor:pointer;border:1px solid var(--line);background:var(--panel-2);color:var(--ink);border-radius:10px;padding:11px 14px;font-size:14px;font-weight:600}
  button.primary{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#03121c;border:none}
  button.ghost{background:transparent}
  button.sm{padding:7px 10px;font-size:12px}
  button:active{transform:translateY(1px)}
  button:disabled{opacity:.45}
  input,select,textarea{font-family:inherit;background:var(--panel-2);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:11px;font-size:16px;width:100%}
  textarea{resize:vertical;min-height:70px;font-size:14px}
  label.f{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin:0 0 5px}
  .seg{display:flex;gap:6px}
  .seg button{flex:1;padding:10px 0;font-variant-numeric:tabular-nums}
  .seg button.on{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#03121c;border:none}
  .goal{background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:12px}
  .goal .top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .goal .nm{font-weight:700;font-size:14px}
  .goal .val{font-variant-numeric:tabular-nums;font-size:13px;color:var(--muted)}
  .bar{height:7px;background:#0a1420;border:1px solid var(--line);border-radius:99px;margin-top:9px;overflow:hidden}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-2));border-radius:99px}
  .bar.gate > i{background:linear-gradient(90deg,var(--warn),var(--good))}
  .setrow{display:grid;grid-template-columns:24px 1fr 1fr 1fr;gap:7px;align-items:center;padding:7px;border:1px solid var(--line);border-radius:10px;background:var(--panel-2);margin-bottom:7px}
  .setrow .idx{width:24px;height:24px;border-radius:7px;background:#0a1620;border:1px solid var(--line);display:grid;place-items:center;font-size:11px;color:var(--muted)}
  .setrow small{display:block;font-size:9px;color:var(--dim);text-transform:uppercase;margin-bottom:2px}
  .setrow input{padding:8px;font-size:16px;text-align:center}
  .bm{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:6px;align-items:end;margin-bottom:7px}
  .bm .nm{font-size:12px;color:var(--muted);padding-bottom:11px}
  .bm input{padding:9px;text-align:center;font-size:15px}
  nav.tabs{position:fixed;bottom:0;left:0;right:0;background:rgba(11,15,20,.94);backdrop-filter:blur(12px);border-top:1px solid var(--line);display:flex;justify-content:center;z-index:50}
  nav.tabs .inner{display:flex;max-width:720px;width:100%}
  nav.tabs button{flex:1;background:none;border:none;border-radius:0;color:var(--dim);padding:10px 2px 14px;font-size:10px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px}
  nav.tabs button .ico{font-size:17px;line-height:1}
  nav.tabs button.on{color:var(--accent)}
  .callout{border-left:3px solid var(--accent);background:var(--panel-2);padding:10px 12px;border-radius:0 10px 10px 10px;font-size:13px;line-height:1.5}
  .callout.warn{border-color:var(--warn)} .callout.bad{border-color:var(--bad)} .callout.good{border-color:var(--good)}
  pre{background:#080c11;border:1px solid var(--line);border-radius:10px;padding:11px;overflow:auto;font-family:var(--mono);font-size:11px;line-height:1.5;color:#b9c7d8;max-height:320px;white-space:pre-wrap}
  .hint{font-size:12px;color:var(--dim);line-height:1.5}
  .tag{font-family:var(--mono);font-size:11px;color:var(--dim)}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:94px;background:var(--panel);border:1px solid var(--line);padding:10px 16px;border-radius:12px;font-size:13px;z-index:80;opacity:0;transition:.25s;pointer-events:none;box-shadow:0 8px 30px rgba(0,0,0,.5)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}
  .nudge{background:#1c160a;border:1px solid #3b2f14;color:var(--warn);border-radius:12px;padding:11px 13px;font-size:13px;display:flex;justify-content:space-between;align-items:center;gap:10px}
  .divider{height:1px;background:var(--line);margin:12px 0}
  .pill.dim{color:var(--dim)}
  .calrow{border-bottom:1px solid var(--line)}
  .calrow:last-child{border-bottom:none}
  .calrow .hd{display:flex;justify-content:space-between;align-items:center;padding:11px 4px;cursor:pointer;gap:8px}
  .calrow.istoday .hd{background:linear-gradient(90deg,rgba(76,194,255,.10),transparent)}
  .calrow.pre .hd{opacity:.4}
  .calrow .date{font-family:var(--mono);color:var(--dim);font-size:11px;width:62px;display:inline-block}
  .calrow .lbl{font-size:13px}
  .calrow .glyph{font-size:13px;margin-left:5px}
  .calrow .glyph.flare{color:var(--bad)} .calrow .glyph.clean{color:var(--good)} .calrow .glyph.open{color:var(--dim)}
  .calrow .detail{padding:2px 6px 14px}
  .calweeklbl{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--accent);text-align:center;padding:9px 0 3px;border-top:1px dashed var(--line);margin-top:3px}
  .menu{position:fixed;inset:0;z-index:70;background:rgba(0,0,0,.5);display:none}
  .menu.open{display:block}
  .menu .panel{position:absolute;top:56px;right:12px;background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;min-width:180px;box-shadow:0 12px 40px rgba(0,0,0,.55)}
  .menu .panel button{display:flex;align-items:center;gap:10px;width:100%;border:none;border-radius:0;background:none;justify-content:flex-start;padding:14px 16px;border-bottom:1px solid var(--line)}
  .menu .panel button:last-child{border-bottom:none}
  .menu .panel button .ico{font-size:16px;width:18px;text-align:center}
  .fade{animation:f .22s ease} @keyframes f{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .exname{font-weight:700;font-size:15px}
  .sev{display:flex;gap:5px}
  .sev button{flex:1;padding:9px 0;font-size:11px}
  .sev button.on[data-v="0"]{background:var(--good);color:#03121c;border:none}
  .sev button.on[data-v="1"]{background:var(--warn);color:#1c0d00;border:none}
  .sev button.on[data-v="2"]{background:#ff8a3d;color:#1c0d00;border:none}
  .sev button.on[data-v="3"]{background:var(--bad);color:#fff;border:none}
</style>
</head>
<body>
<header class="app">
  <div class="row" style="align-items:center;gap:9px">
    <span class="brandmark">◎</span>
    <div><h1>Coach</h1><div class="sub" id="hdrSub">loading…</div></div>
  </div>
  <button class="ghost sm" id="btnMenu" style="font-size:18px;padding:6px 12px">☰</button>
</header>
<main class="wrap" id="view"></main>
<nav class="tabs"><div class="inner" id="tabbar"></div></nav>
<div class="menu" id="menu"><div class="panel" id="menuPanel"></div></div>
<div class="toast" id="toast"></div>

<script>
/* ==========================================================================
   COACH — local-first deterministic training engine.
   Implements coach-training-engine-spec.md (rev 2). No AI at runtime:
   Claude is reached via Export Brief -> chat -> Import Plan (spec §6).

   PRIVACY: this file ships with NO personal data. Your profile, goals,
   constraints and benchmarks are entered on first run and stored ONLY in
   your device's IndexedDB (plus whatever backups you export yourself).
   ========================================================================== */

/* ---------- IndexedDB key-value store ---------- */
const DB='coachdb', ST='kv';
function idb(){ return new Promise((res,rej)=>{ const r=indexedDB.open(DB,1);
  r.onupgradeneeded=()=>r.result.createObjectStore(ST);
  r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
async function kvGet(k){ const d=await idb(); return new Promise((res,rej)=>{
  const q=d.transaction(ST,'readonly').objectStore(ST).get(k);
  q.onsuccess=()=>res(q.result); q.onerror=()=>rej(q.error); }); }
async function kvSet(k,v){ const d=await idb(); return new Promise((res,rej)=>{
  const q=d.transaction(ST,'readwrite').objectStore(ST).put(v,k);
  q.onsuccess=()=>res(); q.onerror=()=>rej(q.error); }); }

/* ---------- helpers ---------- */
const nowISO=()=>new Date().toISOString();
const today=()=>new Date().toISOString().slice(0,10);
const uid=p=>p+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const clamp=(x,a,b)=>Math.max(a,Math.min(b,x));
const round=(x,s)=>s?Math.round(x/s)*s:x;
const fmt=(n,d=1)=>(n==null||isNaN(n))?'—':(+n).toFixed(d).replace(/\.0$/,'');
const daysBetween=(a,b)=>Math.abs(new Date(a)-new Date(b))/864e5;
const dshort=iso=>new Date(iso).toLocaleDateString(undefined,{month:'short',day:'numeric'});
const DOW=['sun','mon','tue','wed','thu','fri','sat'];
/* date-string arithmetic on YYYY-MM-DD (UTC-anchored, like the rest of the app) */
const dayKey=iso=>String(iso).slice(0,10);
function addDays(iso,n){ const d=new Date(dayKey(iso)+'T00:00:00Z'); d.setUTCDate(d.getUTCDate()+n); return d.toISOString().slice(0,10); }
const dowOf=iso=>DOW[new Date(dayKey(iso)+'T00:00:00Z').getUTCDay()];
function dlabel(iso){ return new Date(dayKey(iso)+'T00:00:00Z').toLocaleDateString(undefined,{weekday:'short',timeZone:'UTC'}).toUpperCase()+' '+dayKey(iso).slice(5); }
const planForDate=iso=>S.program.days.find(d=>d.dow===dowOf(iso))||null;
const sessOn=(iso,kind)=>S.sessions.find(s=>s.kind===kind && dayKey(s.date)===dayKey(iso));
function dayFlareOn(iso){ const c=sessOn(iso,'check'); return c ? (c.symptoms||[]).some(x=>x.severity>=2) : false; }
const val=id=>{ const e=document.getElementById(id); return e? e.value : ''; };
const num=id=>{ const v=parseFloat(val(id)); return isNaN(v)? null : v; };

/* ---------- untrusted-input hardening ----------
   Plans and backups are pasted/loaded from outside the app. Everything that
   comes in gets parsed with prototype keys dropped, then shape-checked and
   bounded. Rendering escapes on top of this (defence in depth).            */
const PROTO_KEYS=['__proto__','constructor','prototype'];
const dropProto=(k,v)=> PROTO_KEYS.includes(k) ? undefined : v;
const parseUntrusted=t=>JSON.parse(t,dropProto);
const isObj=o=>o&&typeof o==='object'&&!Array.isArray(o);
const sStr=(v,max)=> typeof v==='string' ? v.slice(0,max||300) : '';
function sInt(v,min,max,dflt){ const n=Number(v); return Number.isFinite(n)? clamp(Math.round(n),min,max) : dflt; }
function sNum(v,min,max,dflt){ const n=Number(v); return Number.isFinite(n)? clamp(n,min,max) : dflt; }

/* ---------- RPE -> %1RM  (reps-to-failure n = reps + (10 - RPE)) ---------- */
const PCT={1:100,2:95.5,3:92.2,4:89.2,5:86.3,6:83.7,7:81.1,8:78.6,9:76.2,10:74.4,11:72.3,12:70.3,13:68,14:66,15:65};
function pct(n){ if(n<=1)return 100; if(n>=15)return 65-(n-15)*1.5;
  const lo=Math.floor(n),hi=Math.ceil(n); return PCT[lo]+(PCT[hi]-PCT[lo])*(n-lo); }
const e1rmOf=(load,reps,rpe)=> (!load||!reps||!rpe)?0: load/(pct(reps+clamp(10-rpe,0,10))/100);
const loadFor=(e1,reps,rpe,step)=> round(e1*(pct(reps+clamp(10-rpe,0,10))/100), step);

/* ================= STATE ================= */
let S={};
const KEYS=['profile','goals','exercises','program','programHistory','sessions','meta'];
const ex=id=>S.exercises.find(e=>e.id===id);
const goal=id=>S.goals.find(g=>g.id===id);
async function save(){ for(const k of KEYS) await kvSet(k,S[k]); }

/* ================= SEED — generic, no personal data ================= */
function seedState(){
  const E=(id,name,pattern,equip,inc,tags,alts,cues)=>({id,name,pattern,equip,increment:inc,tags:tags||[],alternatives:alts||[],cues:cues||[]});
  return {
    profile:{ id:'usr', units:'metric', note:'', constraints:'' },
    goals:[
      {id:'g4',icon:'🦵',name:'Pain-free jogging',unit:'min',baseline:null,current:null,target:30,dir:'up',gate:true,
       note:'THE gate — impact only progresses when the tissue earns it'},
      {id:'g1',icon:'🏃',name:'Fast 5k',unit:'km/h',baseline:null,current:null,target:12,dir:'up',
       note:'Set the baseline with a time-trial'},
      {id:'g2',icon:'⏱️',name:'Cooper test',unit:'m',baseline:null,current:null,target:2400,dir:'up',
       note:'12-minute test — set the baseline'},
      {id:'g3',icon:'⚖️',name:'Bodyweight',unit:'kg',baseline:null,current:null,target:null,dir:'down',
       note:'Diet-led. Training keeps muscle and builds the engine'},
      {id:'g6',icon:'🎯',name:'Readiness goal',unit:'',baseline:null,current:null,target:null,dir:'up',qualitative:true,
       note:''}
    ],
    exercises:[
      E('trap_bar_dl','Trap-bar deadlift','hinge','trap bar',5,['back_sparing'],['hip_thrust','rdl'],['Upright chest, neutral spine — low shear']),
      E('chest_press','Chest-press machine','h_push','machine',5,[],['db_bench'],['Stable base, controlled tempo']),
      E('rfe_split_squat','RFE split squat (3-1-1)','squat','dumbbell',2.5,['knee_hsr','unilateral','back_sparing'],['leg_press','step_up'],['3 seconds down','Knee tissue, minimal spinal load']),
      E('dead_bug','Dead bug','core','bodyweight',0,['anti_extension'],['bird_dog'],['Ribs DOWN — anti-extension','Exhale hard at the end']),
      E('calf_tib','Calf raise + tibialis raise','calf','machine',2.5,[],[],['Ankle armour for running','Superset them']),
      E('front_squat','Front squat','squat','barbell',2.5,['knee_hsr','back_sparing'],['goblet_squat','leg_press'],['Elbows high, stay vertical','Upright torso spares the back']),
      E('cs_row','Chest-supported row','h_pull','machine',2.5,['back_sparing'],['cable_row'],['Chest stays down — zero lumbar load']),
      E('hk_press','Half-kneeling DB press + hold','v_push','dumbbell',2.5,['anti_extension','tactical_stance'],['landmine_press'],['Ribs DOWN, no arch','3s hold at top — stable platform']),
      E('leg_extension','Leg extension (3-1-1 tempo)','knee','machine',5,['knee_hsr','back_sparing'],['spanish_squat','wall_sit'],['3s down, 1s pause — slow is the point','Heavy-slow-resistance: the evidence-based patellar tendon load','Stop ~2 reps shy. Tendon work, not a burnout set']),
      E('spanish_squat','Spanish squat (isometric)','knee','band',0,['tendon_iso','knee_hsr'],['leg_extension','wall_sit'],['40s hold, knees behind the band','Band alternative if no leg-extension machine']),
      E('suitcase_carry','Suitcase carry','carry','dumbbell',2.5,['carry','anti_rotation','tactical_patrol'],['farmer_carry'],['Do NOT lean — anti-lateral-flexion','Loaded carriage + trunk in one']),
      E('tgu','Turkish get-up','tactical','kettlebell',2,['tactical_contact','tactical_stance'],['half_get_up'],['Ground-to-standing','Slow and controlled']),
      E('leg_press','Leg press','squat','machine',5,['back_sparing'],[],['Spares the spine; keep depth honest']),
      E('goblet_squat','Goblet squat','squat','dumbbell',2.5,['back_sparing'],[],[]),
      E('hip_thrust','Hip thrust','hinge','barbell',5,['back_sparing'],[],['Glutes without spinal load']),
      E('rdl','Romanian deadlift (light)','hinge','dumbbell',2.5,['back_sparing'],[],['Sub-max only, neutral spine']),
      E('bird_dog','Bird dog','core','bodyweight',0,['anti_rotation','back_sparing'],[],[]),
      E('cable_row','Seated cable row','h_pull','cable',2.5,['back_sparing'],[],[]),
      E('db_bench','DB bench press','h_push','dumbbell',2.5,[],[],[]),
      E('landmine_press','Landmine press','v_push','barbell',2.5,['back_sparing'],[],[]),
      E('wall_sit','Wall sit','knee','bodyweight',0,['tendon_iso'],[],[]),
      E('step_up','Step-up','squat','dumbbell',2.5,['unilateral'],[],[]),
      E('farmer_carry','Farmer carry','carry','dumbbell',2.5,['carry','tactical_patrol'],[],[]),
      E('half_get_up','Half get-up','tactical','kettlebell',2,['tactical_contact'],[],['Back-friendly regression'])
    ],
    program:{
      id:'prog_rebuild', version:1, status:'active', created_at:nowISO(), created_by:'engine',
      phase:1, block_week:1,
      rationale:'Phase 1 — Build. Aerobic engine + tissue tolerance. Low-impact base with one gated quality impact session; strength rebuild with knee-tendon heavy-slow-resistance and anti-extension core. Gym is strength only (45 min total).',
      days:[
        {id:'gym_a', dow:'mon', kind:'gym', label:'Gym A — Hinge / Push', slots:[
          {id:'a1', exercise_id:'trap_bar_dl',     sets:3, reps:[5,5],   rpe:7,    rest:150},
          {id:'a2', exercise_id:'chest_press',     sets:3, reps:[6,8],   rpe:7,    rest:120},
          {id:'a3', exercise_id:'rfe_split_squat', sets:2, reps:[8,8],   rpe:6,    rest:90},
          {id:'a4', exercise_id:'dead_bug',        sets:3, reps:[8,8],   rpe:null, rest:45},
          {id:'a5', exercise_id:'calf_tib',        sets:2, reps:[15,15], rpe:null, rest:45}
        ]},
        {id:'run_tue', dow:'tue', kind:'run', modality:'run_walk', label:'Run — run/walk ladder',
          note:'The gated impact session. Every bout stays under your symptom line — volume first, bout length later.'},
        {id:'gym_b', dow:'wed', kind:'gym', label:'Gym B — Squat / Pull', slots:[
          {id:'b1', exercise_id:'front_squat',    sets:3, reps:[5,5],   rpe:7,    rest:150},
          {id:'b2', exercise_id:'cs_row',         sets:3, reps:[8,10],  rpe:7,    rest:90},
          {id:'b3', exercise_id:'hk_press',       sets:2, reps:[8,8],   rpe:7,    rest:90},
          {id:'b4', exercise_id:'leg_extension',  sets:3, reps:[6,8],   rpe:7,    rest:90},
          {id:'b5', exercise_id:'suitcase_carry', sets:3, reps:[20,20], rpe:null, rest:60, carry:true},
          {id:'b6', exercise_id:'tgu',            sets:3, reps:[2,2],   rpe:6,    rest:60}
        ]},
        {id:'run_fri', dow:'fri', kind:'run', modality:'ruck', label:'Ruck / loaded walk',
          note:'Zone 2 and loaded carriage in one session. Low impact. Progress the LOAD slowly.'},
        {id:'run_sun', dow:'sun', kind:'run', modality:'zone2', label:'Long Zone 2 — easy',
          note:'Nasal-breathing pace, RPE ≤4. Walk/jog mix — drop to walking the moment the knee talks.'}
      ]
    },
    programHistory:[],
    sessions:[],
    meta:{ setup_done:false, seed_e1rm:{}, ladder:{jog:3,walk:2,rounds:5}, ruck:{load_kg:8,minutes:35},
           last_backup:null, created_at:nowISO() }
  };
}

/* ================= DERIVED — recomputed from the log, never authored ================= */
function derive(){
  const sess=[...S.sessions].sort((a,b)=>a.date.localeCompare(b.date));
  const per={}, now=Date.now();
  let run7=0, run28=0;

  for(const s of sess){
    const age=(now-new Date(s.date))/864e5;
    if(s.kind==='gym'){
      const best={};
      for(const st of (s.sets||[])){
        const d=per[st.exercise_id]||(per[st.exercise_id]={e1:0,hist:[],_drift:[],trend:'—',chg:0,rpe_drift:0});
        const a=st.actual;
        if(a.load_kg && a.reps && a.rpe){
          const e=e1rmOf(a.load_kg,a.reps,a.rpe);
          if(!best[st.exercise_id] || e>best[st.exercise_id]) best[st.exercise_id]=e;
          if(st.prescribed && st.prescribed.rpe!=null) d._drift.push({age, v:a.rpe-st.prescribed.rpe});
        }
      }
      for(const id in best) per[id].hist.push({date:s.date.slice(0,10), v:+best[id].toFixed(1)});
    }
    if(s.kind==='run'){
      const m=s.duration_min||0;
      if(age<=7)  run7+=m;
      if(age<=28) run28+=m;
    }
  }

  for(const id in per){
    const d=per[id];
    d.e1 = d.hist.length ? d.hist[d.hist.length-1].v : (S.meta.seed_e1rm[id]||0);
    const rec=d._drift.filter(x=>x.age<=21).map(x=>x.v);
    d.rpe_drift = rec.length ? +(rec.reduce((a,b)=>a+b,0)/rec.length).toFixed(2) : 0;
    const t=d.hist.slice(-4);
    if(t.length>=2){ d.chg=+(t[t.length-1].v-t[0].v).toFixed(1);
      d.trend = d.chg>0.75?'progressing' : d.chg<-0.75?'regressing' : 'stalling'; }
    else d.trend = d.hist.length?'baseline':'seed';
    delete d._drift;
  }
  for(const id in (S.meta.seed_e1rm||{}))
    if(S.meta.seed_e1rm[id] && !per[id]) per[id]={e1:S.meta.seed_e1rm[id],hist:[],rpe_drift:0,trend:'seed',chg:0};

  /* symptom flares from morning checks — last 14 days */
  const flares=[];
  for(const s of sess){
    if(s.kind!=='check') continue;
    const age=(now-new Date(s.date))/864e5; if(age>14) continue;
    for(const sy of (s.symptoms||[])) if(sy.severity>=2)
      flares.push({date:s.date.slice(0,10), area:sy.area, severity:sy.severity, age});
  }
  const flareAreas=[...new Set(flares.map(f=>f.area))];

  const bws=sess.filter(s=>s.kind==='check'&&s.bodyweight_kg);
  const bw = bws.length? bws[bws.length-1].bodyweight_kg : null;

  /* impact ladder — replayed from the log (§5.4) */
  const L={...S.meta.ladder};
  for(const r of sess.filter(s=>s.kind==='run'&&s.modality==='run_walk')){
    const after=sess.filter(c=>c.kind==='check' && new Date(c.date)>new Date(r.date) && daysBetween(c.date,r.date)<=2);
    let worst=0;
    for(const c of after) for(const sy of (c.symptoms||[]))
      if(['knee','ankle','back'].includes(sy.area)) worst=Math.max(worst, sy.severity);
    if(worst>=2)       L.jog=Math.max(2, +(L.jog-1).toFixed(1));      // REGRESS
    else if(worst===1) { /* HOLD */ }
    else               L.jog=Math.min(30, round(L.jog*1.1, 0.5));     // PROGRESS
  }

  const flags=[];
  for(const id in per){
    const d=per[id]; if(!ex(id)) continue;
    if(d.rpe_drift>=1.0) flags.push({sev:d.rpe_drift>=1.3?'act':'watch', t:ex(id).name+': RPE drifting +'+fmt(d.rpe_drift)+' — pull intensity'});
    else if(d.trend==='regressing') flags.push({sev:'watch', t:ex(id).name+': e1RM down '+fmt(-d.chg)+' kg'});
  }
  for(const a of flareAreas){
    const n=flares.filter(f=>f.area===a).length;
    flags.push({sev:n>=2?'act':'watch', t:a+' flare ×'+n+' in 14 days — impact gated, exercises auto-swapped'});
  }
  /* missed-pattern: scheduled training days in the past 14d (>= install) with no
     matching session. A single miss is noise; a PATTERN is a planning signal —
     flag it toward re-planning, never toward cramming (tissue-first). */
  const adher=adherenceWindow(14);
  if(adher.runsMissed>=2)
    flags.push({sev:'watch', t:'Missed '+adher.runsMissed+' of your last '+adher.runsPlanned+' runs — aerobic base isn’t building. Export a brief to adjust the schedule.'});
  else if(adher.gymMissed>=2)
    flags.push({sev:'watch', t:'Missed '+adher.gymMissed+' of your last '+adher.gymPlanned+' gym sessions — consider re-planning around your week.'});

  /* goal stats — filled from the LOG, not authored (matches the whole app).
     g4 = the ladder's sustainable jog bout · g1 = fastest logged ≥3km run ·
     g2 = best Cooper-test distance · g3 = latest bodyweight. baseline is the
     earliest measurement, current the best, so the bar shows real progress. */
  const gs={};
  const speedRuns=sess.filter(s=>s.kind==='run'&&s.speed_kmh&&s.distance_km>=3).sort((a,b)=>a.date.localeCompare(b.date));
  if(speedRuns.length) gs.g1={ base:speedRuns[0].speed_kmh, cur:Math.max(...speedRuns.map(s=>s.speed_kmh)) };
  const coopers=sess.filter(s=>s.kind==='run'&&s.modality==='test_cooper'&&s.distance_km).sort((a,b)=>a.date.localeCompare(b.date));
  if(coopers.length){ const m=coopers.map(s=>Math.round(s.distance_km*1000)); gs.g2={ base:m[0], cur:Math.max(...m) }; }

  return {per, run7, run28, flares, flareAreas, bw, ladder:L, flags, adherence:adher, gs};
}

/* effective goal value, derived from the log where possible */
function goalStat(g,D){
  if(g.id==='g3') return {cur:(D.bw!=null?D.bw:g.current), base:g.baseline, target:g.target};
  if(g.id==='g4') return {cur:(D.ladder?+(+D.ladder.jog).toFixed(1):g.current), base:g.baseline, target:g.target};
  if(g.id==='g1'&&D.gs.g1) return {cur:D.gs.g1.cur, base:Math.min(D.gs.g1.base, g.target), target:g.target};
  if(g.id==='g2'&&D.gs.g2) return {cur:D.gs.g2.cur, base:Math.min(D.gs.g2.base, g.target), target:g.target};
  return {cur:g.current, base:g.baseline, target:g.target};
}

/* Adherence over the past `days` days (training days only, >= install date). */
function adherenceWindow(days){
  const t=today(), created=dayKey((S.meta&&S.meta.created_at)||t);
  let planned=0, logged=0, runsPlanned=0, runsMissed=0, gymPlanned=0, gymMissed=0;
  for(let i=days;i>=0;i--){
    const d=addDays(t,-i);
    if(d>t || d<created) continue;
    const plan=planForDate(d); if(!plan) continue;   // rest day
    planned++;
    const hit=!!sessOn(d,plan.kind);
    if(hit) logged++;
    if(plan.kind==='run'){ runsPlanned++; if(!hit) runsMissed++; }
    if(plan.kind==='gym'){ gymPlanned++; if(!hit) gymMissed++; }
  }
  return {planned, logged, runsPlanned, runsMissed, gymPlanned, gymMissed};
}

function progressOf(g,D){
  const s = D? goalStat(g,D) : {cur:g.current, base:g.baseline, target:g.target};
  if(g.qualitative||s.cur==null||s.base==null||s.target==null||s.target===s.base) return null;
  return clamp((s.cur-s.base)/(s.target-s.base),0,1);
}

/* ================= FAST LOOP (§5.1–5.5) ================= */
function readinessScore(r){ if(!r) return 3;
  return +(((r.sleep||3)+(6-(r.stress||3))+(6-(r.soreness||3))+(r.energy||3))/4).toFixed(2); }

/* Readiness -> whole PLATE STEPS, not a percentage.
   A percentage band cannot survive plate rounding: -1.5% of a 105 kg trap bar
   is -1.6 kg, which rounds to nothing, so moderate readiness silently did
   nothing and the 1-5 scale collapsed into three outcomes. Steps are always
   expressible, monotonic, and legible. (Supersedes the old +/-6% band.) */
function readinessSteps(score){
  if(score>=4.00) return  1;
  if(score>=2.75) return  0;
  if(score>=2.25) return -1;
  if(score>=1.75) return -2;
  return -3;
}
function readinessVerdict(score){
  const s=readinessSteps(score);
  return s>0   ? 'green light — one step up'
       : s===0 ? 'normal range — loads unchanged'
       : s===-1? 'backing off one step'
       : s===-2? 'backing off two steps'
       :         'heavily backed off — consider making today a walk';
}

function planGym(day, readiness, D){
  const steps=readinessSteps(readinessScore(readiness));
  return day.slots.map(sl=>{
    let exId=sl.exercise_id, swapped=null;
    if(D.flareAreas.includes('back') && ['trap_bar_dl','front_squat'].includes(exId)){
      swapped=exId; exId = exId==='trap_bar_dl' ? 'hip_thrust' : 'leg_press';
    } else if(D.flareAreas.includes('knee') && ['front_squat','rfe_split_squat'].includes(exId)){
      swapped=exId; exId='leg_press';
    }
    const e=ex(exId), d=D.per[exId];
    const targetReps=sl.reps[1], targetRpe=sl.rpe;
    let suggested=null, basis='first time — log your working weight', mods=[];

    if(sl.isometric){ basis=targetReps+'s hold'; }
    else if(sl.carry){ basis=targetReps+' m per trip'; }
    else if(targetRpe && d && d.e1>0){
      let L=loadFor(d.e1, targetReps, targetRpe, e.increment||2.5);
      basis='e1RM '+fmt(d.e1)+' kg → '+targetReps+'×@'+targetRpe;
      if(d.rpe_drift>=1.0){ const c=round(L*0.05, e.increment||2.5); L-=c; mods.push('−'+fmt(c)+' drift'); }
      if(steps!==0){ const a=steps*(e.increment||2.5); L+=a; mods.push((a>0?'+':'')+fmt(a)+' readiness'); }
      if(progressionEarned(exId, sl)){ L+=(e.increment||2.5); mods.push('+'+fmt(e.increment)+' progression'); }
      suggested=Math.max(e.increment||2.5, round(L, e.increment||2.5));
    }
    return {slot:sl, ex:e, exId, swapped, targetReps, targetRpe, suggested, basis, mods};
  });
}
function progressionEarned(exId, sl){
  if(!sl.rpe) return false;
  const last=[...S.sessions].filter(s=>s.kind==='gym'&&(s.sets||[]).some(x=>x.exercise_id===exId))
    .sort((a,b)=>b.date.localeCompare(a.date))[0];
  if(!last) return false;
  const sets=last.sets.filter(x=>x.exercise_id===exId);
  return sets.length>0 && sets.every(x=>x.actual.reps>=sl.reps[1] && x.actual.rpe!=null && x.actual.rpe<=sl.rpe);
}
function planRun(day, D){
  const gated=D.flareAreas.some(a=>['knee','ankle','back'].includes(a));
  const tol=goal('g4').baseline;
  if(day.modality==='run_walk'){
    const L=D.ladder;
    if(gated) return {gated:true, headline:'⚠ Swap to LOW-IMPACT today',
      detail:'Symptom flare logged — impact is gated. Do '+(L.rounds*(L.jog+L.walk))+' min easy on the crosstrainer or bike instead. Protecting the tissue IS the route to the 5k.'};
    return {gated:false, headline:L.rounds+' × ('+fmt(L.jog)+' min jog / '+L.walk+' min walk)',
      detail:fmt(L.jog*L.rounds)+' min of jogging total.'+(tol?' Each bout stays under your '+tol+'-min symptom line.':'')};
  }
  if(day.modality==='ruck'){ const r=S.meta.ruck;
    return {gated:false, headline:r.minutes+' min ruck @ '+r.load_kg+' kg',
      detail:'Zone 2 + loaded carriage in one. Brisk walk, neutral spine, no hunching. Progress the load slowly.'};
  }
  return {gated:false, headline:'35–45 min easy Zone 2',
    detail: gated? 'Flare logged — keep it to walking or the crosstrainer today.' : 'Nasal-breathing pace, RPE ≤4. Walk/jog mix.'};
}

/* ================= BRIEF EXPORT (§6) ================= */
function buildBrief(userNote){
  const D=derive(), P=S.program, L=[];
  L.push('# Coach — Training Brief');
  L.push('_Generated '+today()+' · program '+P.id+' v'+P.version+' · phase '+P.phase+', block week '+P.block_week+'_');
  L.push('');
  L.push('## Athlete');
  if(S.profile.note) L.push(S.profile.note);
  if(S.profile.constraints) L.push('**Constraints (must program around these):** '+S.profile.constraints);
  L.push('Week: Mon gym · Tue run · Wed gym · Fri ruck · Sun run. Gym is strength only, hard time cap.');
  L.push('');
  L.push('## Goals & progress');
  for(const g of S.goals){
    const p=progressOf(g,D);
    const cur = goalStat(g,D).cur;
    L.push('- **'+g.name+'**'+(g.gate?' _(GATE)_':'')+': '+(cur==null?'not set':fmt(cur)+' '+g.unit)+
      ' → target '+(g.target==null?'—':g.target+' '+g.unit)+(p!=null?' ('+Math.round(p*100)+'%)':'')+
      (g.qualitative&&g.note?' — '+g.note:''));
  }
  L.push('');
  L.push('## Signals (computed from the log)');
  L.push('- Running volume: '+Math.round(D.run7)+' min last 7d · '+Math.round(D.run28)+' min last 28d');
  L.push('- Bodyweight: '+(D.bw?D.bw+' kg':'not logged')+(goal('g3').target?' (target '+goal('g3').target+' kg)':''));
  L.push('- Impact ladder: '+fmt(D.ladder.jog)+' min jog × '+D.ladder.rounds+' rounds (walk '+D.ladder.walk+' min)');
  L.push('- Strength:');
  for(const id in D.per){
    if(!ex(id)) continue; const d=D.per[id];
    L.push('  - '+ex(id).name+': e1RM '+fmt(d.e1)+' kg · trend '+d.trend+
      (d.chg?' ('+(d.chg>0?'+':'')+fmt(d.chg)+' kg)':'')+' · RPE drift '+(d.rpe_drift>0?'+':'')+fmt(d.rpe_drift));
  }
  L.push('');
  L.push('## Symptoms (last 14 days)');
  if(!D.flares.length) L.push('- None logged. Clean.');
  else for(const f of D.flares) L.push('- '+f.date+': **'+f.area+'** severity '+f.severity+'/3');
  L.push('');
  L.push('## Flags');
  if(!D.flags.length) L.push('- None. Progression is clear to run.');
  else for(const f of D.flags) L.push('- ['+f.sev.toUpperCase()+'] '+f.t);
  L.push('');
  L.push('## Current program');
  for(const d of P.days){
    if(d.kind==='gym') L.push('- **'+d.dow.toUpperCase()+' — '+d.label+'**: '+d.slots.map(s=>
      (ex(s.exercise_id)?ex(s.exercise_id).name:s.exercise_id)+' '+s.sets+'×'+
      (s.reps[0]===s.reps[1]?s.reps[0]:s.reps.join('-'))+(s.rpe?' @RPE'+s.rpe:'')).join(' · '));
    else L.push('- **'+d.dow.toUpperCase()+' — '+d.label+'** ('+d.modality+')');
  }
  L.push('');
  L.push('## Recent sessions (last 10)');
  const rec=[...S.sessions].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10);
  if(!rec.length) L.push('- Nothing logged yet.');
  for(const s of rec){
    if(s.kind==='gym'){
      const tops={};
      for(const st of s.sets){
        const e=e1rmOf(st.actual.load_kg,st.actual.reps,st.actual.rpe);
        if(!tops[st.exercise_id] || e>tops[st.exercise_id].e) tops[st.exercise_id]={e,st};
      }
      L.push('- '+s.date.slice(0,10)+' **'+s.day_label+'** (readiness '+fmt(readinessScore(s.readiness))+'/5): '+
        Object.keys(tops).map(id=>(ex(id)?ex(id).name:id)+' '+tops[id].st.actual.load_kg+'×'+tops[id].st.actual.reps+'@'+tops[id].st.actual.rpe).join('; ')+
        (s.note?' — "'+s.note+'"':''));
    } else if(s.kind==='run'){
      L.push('- '+s.date.slice(0,10)+' **'+s.day_label+'** ('+s.modality+'): '+s.duration_min+' min'+
        (s.distance_km?', '+s.distance_km+' km':'')+(s.load_kg?', '+s.load_kg+' kg':'')+', RPE '+(s.rpe||'—')+
        (s.note?' — "'+s.note+'"':''));
    } else {
      const sy=(s.symptoms||[]).filter(x=>x.severity>0).map(x=>x.area+' '+x.severity).join(', ')||'clean';
      L.push('- '+s.date.slice(0,10)+' **morning check**: '+sy+(s.bodyweight_kg?' · '+s.bodyweight_kg+' kg':'')+
        (s.note?' — "'+s.note+'"':''));
    }
  }
  L.push('');
  if(userNote && userNote.trim()){ L.push('## My question'); L.push(userNote.trim()); L.push(''); }
  L.push('---');
  L.push('## Instructions for you (the coach)');
  L.push('You are my strength & conditioning coach. Principles: the CONSTRAINT governs the plan, not the goal — tissue tolerance (pain-free jogging) gates ALL impact progression. Aerobic base first. Anti-fragility via graded exposure. RPE autoregulation. Respect my constraints above absolutely.');
  L.push('');
  L.push('1. Tell me in plain English what the data says and what you would change — tie every change to a GOAL.');
  L.push('2. Then output the new plan as a SINGLE json code block matching this shape. Include only what you are changing. Use exercise ids from the current program.');
  L.push('');
  L.push('```json');
  L.push(JSON.stringify({
    rationale:'why this version exists — tied to my goals',
    phase:P.phase, block_week:P.block_week+1,
    ladder:{jog:D.ladder.jog, walk:D.ladder.walk, rounds:D.ladder.rounds},
    ruck:S.meta.ruck,
    days:[{id:'gym_a', slots:[{id:'a1', exercise_id:'trap_bar_dl', sets:3, reps:[5,5], rpe:7, rest:150}]}]
  },null,2));
  L.push('```');
  return L.join('\n');
}

/* ================= IMPORT PLAN (§6) ================= */
const MODALITIES=['run_walk','ruck','zone2'];
/* Copy ONLY known fields, each bounded. Never Object.assign untrusted input. */
function sanitizeSlot(ps, existing){
  const out = existing ? JSON.parse(JSON.stringify(existing)) : {id:sStr(ps.id,64)||uid('slot')};
  if(ps.exercise_id!==undefined){
    if(!ex(ps.exercise_id)) throw new Error('Unknown exercise id "'+sStr(ps.exercise_id,40)+'" — use ids from the current program.');
    out.exercise_id=ps.exercise_id;
  }
  if(!out.exercise_id) throw new Error('A slot is missing its exercise_id.');
  if(ps.sets!==undefined) out.sets=sInt(ps.sets,1,10,3);
  if(ps.reps!==undefined){
    const r=Array.isArray(ps.reps)? ps.reps : [ps.reps,ps.reps];
    out.reps=[sInt(r[0],1,300,5), sInt(r[1],1,300,5)];
    if(out.reps[1]<out.reps[0]) out.reps[1]=out.reps[0];
  }
  if(ps.rpe!==undefined)  out.rpe = ps.rpe===null? null : sNum(ps.rpe,5,10,7);
  if(ps.rest!==undefined) out.rest=sInt(ps.rest,0,900,90);
  if(ps.isometric!==undefined) out.isometric=!!ps.isometric;
  if(ps.carry!==undefined)     out.carry=!!ps.carry;
  return out;
}
function importPlan(text){
  let raw=(text||'').trim();
  if(raw.length>500000) throw new Error('That input is too large to be a plan.');
  const m=raw.match(/```(?:json)?\s*([\s\S]*?)```/);
  if(m) raw=m[1].trim();
  let p;
  try{ p=parseUntrusted(raw); }
  catch(e){ throw new Error('Not valid JSON — ask Claude to re-send just the json block.'); }
  if(!isObj(p)) throw new Error('Expected a JSON object.');

  const cur=S.program;
  const next=JSON.parse(JSON.stringify(cur));
  next.version=cur.version+1; next.supersedes=cur.version;
  next.created_at=nowISO(); next.created_by='claude';
  if(p.rationale!==undefined)  next.rationale=sStr(p.rationale,2000) || next.rationale;
  if(p.phase!==undefined)      next.phase=sInt(p.phase,1,10,next.phase);
  if(p.block_week!==undefined) next.block_week=sInt(p.block_week,1,52,next.block_week);

  if(Array.isArray(p.days)) for(const pd of p.days.slice(0,20)){
    if(!isObj(pd)) continue;
    const d=next.days.find(x=>x.id===pd.id);
    if(!d) continue;
    if(pd.label!==undefined)    d.label=sStr(pd.label,80) || d.label;
    if(pd.note!==undefined)     d.note=sStr(pd.note,500);
    if(pd.modality!==undefined && MODALITIES.includes(pd.modality)) d.modality=pd.modality;
    if(Array.isArray(pd.slots)){
      if(!Array.isArray(d.slots)) continue;              // never add lifts to a run day
      for(const ps of pd.slots.slice(0,12)){
        if(!isObj(ps)) continue;
        const i=d.slots.findIndex(x=>x.id===ps.id);
        if(i>=0) d.slots[i]=sanitizeSlot(ps,d.slots[i]);
        else if(d.slots.length<12) d.slots.push(sanitizeSlot(ps,null));
      }
    }
  }
  if(isObj(p.ladder)) S.meta.ladder={
    jog:    sNum(p.ladder.jog,    1, 60, S.meta.ladder.jog),
    walk:   sNum(p.ladder.walk,   0, 30, S.meta.ladder.walk),
    rounds: sInt(p.ladder.rounds, 1, 20, S.meta.ladder.rounds)
  };
  if(isObj(p.ruck)) S.meta.ruck={
    load_kg: sNum(p.ruck.load_kg, 0, 60,  S.meta.ruck.load_kg),
    minutes: sInt(p.ruck.minutes, 5, 300, S.meta.ruck.minutes)
  };

  S.programHistory.push({...cur, status:'archived'});
  S.program=next;
  return next;
}

function backupData(){ const d={_format:'coach/1', exported_at:nowISO()}; for(const k of KEYS) d[k]=S[k]; return d; }

let backupBusy=false;
let lastBackupError=null;

/* Export is tried share -> download -> clipboard. Each layer reports the REAL
   error. save()/render() run AFTER, outside the try, so a successful export is
   never reported as a failure. Re-entrancy guarded: the Web Share API rejects
   concurrent calls, and a double-tap used to surface as "Backup failed".      */
async function doBackup(){
  if(backupBusy){ toast('Backup already in progress…'); return; }
  backupBusy=true; setBackupBusy(true);
  lastBackupError=null;
  let done=false, how='', cancelled=false;
  const json=JSON.stringify(backupData(),null,2);
  const name='coach-backup-'+today()+'.json';
  const blob=new Blob([json],{type:'application/json'});

  try{
    // 1) Android share sheet -> Save to Drive
    try{
      if(navigator.canShare && typeof File!=='undefined'){
        const file=new File([blob],name,{type:'application/json'});
        if(navigator.canShare({files:[file]})){
          await navigator.share({files:[file]});   // no title: some Android builds reject title+files
          done=true; how='share';
        }
      }
    }catch(e){
      if(e && e.name==='AbortError'){ cancelled=true; }
      else { lastBackupError=e; console.error('[backup] share failed:',e); }
    }
    // 2) download fallback
    if(!done && !cancelled){
      try{
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');
        a.href=url; a.download=name; a.rel='noopener';
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(()=>URL.revokeObjectURL(url),4000);
        done=true; how='download';
      }catch(e){ lastBackupError=e; console.error('[backup] download failed:',e); }
    }
    // 3) clipboard fallback — last resort, still gets the data off the device
    if(!done && !cancelled){
      try{ await navigator.clipboard.writeText(json); done=true; how='clipboard'; }
      catch(e){ lastBackupError=e; console.error('[backup] clipboard failed:',e); }
    }
  } finally { backupBusy=false; setBackupBusy(false); }

  if(cancelled){ toast('Backup cancelled'); return; }

  if(done){
    try{ S.meta.last_backup=nowISO(); await save(); }
    catch(e){ console.error('[backup] exported OK but saving the timestamp failed:',e); }
    toast(how==='clipboard' ? 'Copied to clipboard ✓ — paste it somewhere safe'
        : how==='download'  ? 'Backup downloaded ✓' : 'Backed up ✓');
    try{ render(); }catch(e){ console.error('[backup] render after backup failed:',e); }
  } else {
    const e=lastBackupError;
    toast('Backup failed — '+(e ? (e.name||'Error')+': '+(e.message||'no detail') : 'no export method available'));
  }
}
async function doRestore(file){
  if(file.size>20*1024*1024) throw new Error('That file is too large to be a backup.');
  const d=parseUntrusted(await file.text());
  if(!isObj(d)) throw new Error('Not a backup file.');
  if(d._format!=='coach/1') throw new Error('Unrecognised backup format.');
  if(!Array.isArray(d.sessions) || !isObj(d.program) || !Array.isArray(d.goals) || !Array.isArray(d.exercises))
    throw new Error('Backup is missing required data — refusing to load it.');
  for(const k of KEYS) if(d[k]!==undefined) S[k]=d[k];
  if(!isObj(S.meta)) S.meta=seedState().meta;
  if(!Array.isArray(S.programHistory)) S.programHistory=[];
  await save(); App.draft=null; App.check=null; render(); toast('Restored ✓');
}

function wireSetup(){
  document.getElementById('btnSetup').onclick=async()=>{
    const jog=num('sJogNow');
    if(!jog) return toast('Enter your pain-free jog minutes — it is the gate');

    S.profile.note=val('sNote').trim();
    S.profile.constraints=val('sCon').trim();

    /* ladder starts at ~half your symptom-line tolerance (safe bouts), ~20 min jogging */
    const j=clamp(round(jog/2,0.5),2,8);
    S.meta.ladder={ jog:j, walk:2, rounds:clamp(Math.round(20/j),3,6) };

    /* jog-gate goal tracks the ladder bout: baseline = where the ladder STARTS
       (not your flare threshold), so progress climbs cleanly 0->100% toward target */
    const g4=goal('g4'); g4.baseline=j; g4.current=j; g4.target=num('sJogTgt')||30;
    const g3=goal('g3'); g3.baseline=num('sBwNow'); g3.current=num('sBwNow'); g3.target=num('sBwTgt');
    goal('g1').target=num('sSpd')||12;
    goal('g2').target=num('sCoop')||2400;
    const g6=goal('g6');
    if(val('sG6').trim()) g6.name=val('sG6').trim();
    g6.note=val('sG6n').trim();

    /* benchmarks -> e1RM seeds */
    const seeds={};
    for(const b of BENCH){
      const kg=num('bk_'+b[0]), reps=num('br_'+b[0]), rpe=num('bp_'+b[0]);
      if(kg&&reps&&rpe){ const e=e1rmOf(kg,reps,rpe); if(e>0) seeds[b[0]]=+e.toFixed(1); }
    }
    S.meta.seed_e1rm=seeds;

    S.meta.setup_done=true;
    await save(); App.tab='goals'; render(); toast('Coach is ready ✓');
  };
}

function calRow(d,D){
  const t=today(), plan=planForDate(d);
  const created=dayKey((S.meta&&S.meta.created_at)||t);
  const pre=d<created, isToday=d===t, isFuture=d>t;
  const label=plan?plan.label:'Rest';
  const logged = plan && !isFuture ? sessOn(d,plan.kind) : null;
  const chk=sessOn(d,'check'), flare=dayFlareOn(d);
  let pill='';
  if(pre){} else if(isToday) pill='<span class="pill" style="border-color:var(--accent);color:var(--accent)">● today</span>';
  else if(isFuture) pill = plan?'<span class="pill dim">planned</span>':'';
  else if(plan) pill = logged?'<span class="pill good">✓ logged</span>':'<span class="pill bad">✕ missed</span>';
  const glyph = (!plan||isFuture||pre) ? ''
    : chk ? '<span class="glyph '+(flare?'flare':'clean')+'">'+(flare?'♥':'♡')+'</span>'
          : '<span class="glyph open">♡</span>';
  const open=App.cal.open===d;
  return '<div class="calrow'+(isToday?' istoday':'')+(pre?' pre':'')+'">'+
    '<div class="hd" data-toggle="'+d+'"><span><span class="date">'+dlabel(d)+'</span><span class="lbl">'+esc(label)+'</span></span>'+
      '<span>'+pill+glyph+'</span></div>'+

}

          actual:{ load_kg:a.load?+a.load:0, reps:a.reps?+a.reps:0, rpe:a.rpe?+a.rpe:null } }); });
    }
    if(!sets.length) return toast('Enter at least one set');
    S.sessions.push({ id:uid('s'), kind:'gym', date:dateISO, day_id:day.id, day_label:day.label,
      program_id:S.program.id, program_version:S.program.version, readiness:null, sets,
      note:val('bdNote'), backdated:true, created_at:nowISO() });

    const dist=num('bdDist');
    const s={ id:uid('s'), kind:'run', date:dateISO, day_id:day.id, day_label:day.label,
      program_id:S.program.id, program_version:S.program.version, modality:day.modality,

/* RPE cap (spec §5.1): a set logged above target+1 pulls the REMAINING unlogged
   sets down one increment. Updates the inputs directly rather than re-rendering,
   so it never steals focus mid-set. Idempotent — always derived from this set's
   own load, so retyping the RPE can't stack reductions. */
function applyRpeCap(slotId, setIdx){
  if(!App.draft || !App.draft.rows) return;
  const row=App.draft.rows.find(r=>r.slot.id===slotId);
  if(!row || !row.slot.rpe || row.slot.isometric || row.slot.carry) return;
  const arr=App.draft.actuals[slotId]; if(!arr) return;
  const a=arr[setIdx];
  if(a.rpe===''||a.rpe==null||isNaN(a.rpe)) return;
  if(a.rpe - row.slot.rpe <= 1) return;                 // within tolerance
  const inc=row.ex.increment||2.5;
  const cur=(a.load===''||a.load==null)? row.suggested : +a.load;
  if(cur==null||isNaN(cur)) return;
  const next=Math.max(inc, round(cur-inc, inc));
  let changed=0;
  for(let j=setIdx+1;j<arr.length;j++){
    if(arr[j].rpe!=='' && arr[j].rpe!=null) continue;   // already logged — leave it
    if(arr[j].load===next) continue;
    arr[j].load=next; changed++;
    const el=document.querySelector('input[data-s="'+slotId+'"][data-i="'+j+'"][data-k="load"]');
    if(el) el.value=next;
  }
  if(changed) toast('RPE '+a.rpe+' over target '+row.slot.rpe+' — remaining sets → '+next+' kg');
}

async function logGym(){
  const day=S.program.days.find(d=>d.id===App.draft.dayId);
  const sets=[];
  for(const r of App.draft.rows){
    const arr=App.draft.actuals[r.slot.id]||[];
    arr.forEach((a,i)=>{
      if(a.load===''&&a.reps==='') return;
      sets.push({ id:uid('set'), exercise_id:r.exId, set_index:i+1,
        prescribed:{ load_kg:r.suggested!=null?r.suggested:null, reps:r.targetReps, rpe:r.targetRpe!=null?r.targetRpe:null },
        actual:{ load_kg:a.load===''?0:+a.load, reps:a.reps===''?0:+a.reps, rpe:a.rpe===''?null:+a.rpe } });
    });
  }
  if(!sets.length) return toast('Log at least one set');
  S.sessions.push({ id:uid('s'), kind:'gym', date:nowISO(), day_id:day.id, day_label:day.label,
    program_id:S.program.id, program_version:S.program.version, readiness:{...App.readiness}, sets,
    note:val('sessNote'), created_at:nowISO() });
  await save(); App.draft=null; App.tab='goals'; render(); toast('Session logged ✓');
}
async function logRun(){
  const day=S.program.days.find(d=>d.id===App.draft.dayId);
  const dur=num('rDur');
  if(!dur) return toast('Enter the duration');
  const dist=num('rDist');
  const s={ id:uid('s'), kind:'run', date:nowISO(), day_id:day.id, day_label:day.label,
    program_id:S.program.id, program_version:S.program.version, modality:day.modality,
    duration_min:dur, distance_km:dist, rpe:num('rRpe'),
    load_kg: day.modality==='ruck' ? num('rLoad') : null,
    note:val('rNote'), created_at:nowISO() };
  if(dist && dur) s.speed_kmh=+((dist/(dur/60)).toFixed(2));
  S.sessions.push(s);
  if(day.modality==='ruck' && s.load_kg) S.meta.ruck.load_kg=s.load_kg;
  await save(); App.draft=null; App.tab='goals'; render(); toast('Run logged ✓ — check in tomorrow morning');
}
async function logCheck(){
  const bw=num('cBw');
  S.sessions.push({ id:uid('s'), kind:'check', date:nowISO(),
    symptoms:AREAS.map(a=>({area:a[0], severity:App.check.symptoms[a[0]]||0})),
    bodyweight_kg:bw, note:val('cNote'), created_at:nowISO() });
  if(bw) goal('g3').current=bw;
  App.check=null; await save(); App.tab='goals'; render(); toast('Check logged ✓');
}

/* ================= BOOT ================= */
(async function boot(){
  try{
    const p=await kvGet('profile');
    if(!p){ S=seedState(); await save(); }
    else {
      S={}; for(const k of KEYS) S[k]=await kvGet(k);
      const seed=seedState();
      for(const k of KEYS) if(!S[k]) S[k]=seed[k];
      if(S.meta.setup_done===undefined) S.meta.setup_done=true;   // pre-setup installs keep working
    }
    try{ if(navigator.storage && navigator.storage.persist) await navigator.storage.persist(); }catch(_){}
    render();
    if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }catch(e){
    document.getElementById('view').innerHTML='<div class="card"><h3>Startup error</h3><pre>'+esc(e.message)+'</pre></div>';
  }
})();
</script>
